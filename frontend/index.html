<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>Expense Tracker</h1>

        <p>Track expenses and manage budgets</p>

        <input
            type="email"
            id="loginEmail"
            placeholder="Email"
        >

        <input
            type="password"
            id="loginPassword"
            placeholder="Password"
        >

        <button onclick="login()">
            Login
        </button>

        <div class="auth-switch">
            New user?
            <a href="signup.html">Sign Up</a>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
